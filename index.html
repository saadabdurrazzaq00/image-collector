<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Collector</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e2e8f0;
}

/* Glass Card */
.card {
    width: 420px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 25px;
}

/* Upload Area */
.upload-area {
    border: 2px dashed rgba(255,255,255,0.1);
    padding: 35px 20px;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.upload-area:hover {
    border-color: #6366f1;
    background: rgba(99,102,241,0.08);
}

.upload-area span {
    font-size: 14px;
    color: #cbd5f5;
}

/* Button */
button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99,102,241,0.4);
}

/* Progress */
.progress-container {
    margin-top: 18px;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    transition: width 0.3s ease;
}

/* Status */
.status {
    margin-top: 10px;
    font-size: 13px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="card">
    <h1>Image Collector</h1>
    <div class="subtitle">Merge all images from folders into one clean download</div>

    <label class="upload-area">
        <span>Click or drag a folder</span>
        <input type="file" id="folderInput" webkitdirectory multiple hidden>
    </label>

    <button onclick="processImages()">Collect & Download</button>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">Waiting for input...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>
const input = document.getElementById('folderInput');
const progressBar = document.getElementById('progressBar');
const status = document.getElementById('status');

// Drag & Drop support
document.querySelector('.upload-area').addEventListener('dragover', e => {
    e.preventDefault();
});

document.querySelector('.upload-area').addEventListener('drop', e => {
    e.preventDefault();
    input.files = e.dataTransfer.files;
    status.innerText = "Folder selected.";
});

async function processImages() {
    const files = input.files;

    if (files.length === 0) {
        status.innerText = "Please select a folder.";
        return;
    }

    const zip = new JSZip();
    const folder = zip.folder("all_images");

    let count = 0;
    let processed = 0;

    for (let file of files) {
        const name = file.name.toLowerCase();
        if (name.endsWith(".png") || name.endsWith(".jpg") || name.endsWith(".jpeg")) {
            count++;
        }
    }

    if (count === 0) {
        status.innerText = "No images found.";
        return;
    }

    for (let file of files) {
        const name = file.name.toLowerCase();
        if (name.endsWith(".png") || name.endsWith(".jpg") || name.endsWith(".jpeg")) {
            const content = await file.arrayBuffer();
            folder.file(file.name, content);

            processed++;
            let percent = Math.round((processed / count) * 100);
            progressBar.style.width = percent + "%";
            status.innerText = `Processing ${processed}/${count} images...`;
        }
    }

    status.innerText = "Compressing...";

    const blob = await zip.generateAsync({ type: "blob" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "all_images.zip";
    link.click();

    status.innerText = `Done. ${count} images ready.`;
    progressBar.style.width = "100%";
}
</script>

</body>
</html>
