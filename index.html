<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body {
    height:100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e2e8f0;
}

.card {
    width:420px;
    padding:35px;
    border-radius:20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    text-align:center;
}

h1 {font-size:24px;margin-bottom:6px;}
.subtitle {font-size:14px;color:#94a3b8;margin-bottom:25px;}

.upload {
    border:2px dashed rgba(255,255,255,0.1);
    padding:30px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
}

.upload:hover {
    border-color:#6366f1;
    background:rgba(99,102,241,0.08);
}

button {
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    color:white;
    cursor:pointer;
}

.progress {
    margin-top:15px;
    height:6px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
}

.bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#6366f1,#22c55e);
    transition:0.3s;
}

.status {
    margin-top:10px;
    font-size:13px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">
    <h1>ImageFlow</h1>
    <div class="subtitle">Merge all images into one clean download</div>

    <label class="upload">
        Click or drag folder
        <input type="file" id="input" webkitdirectory multiple hidden>
    </label>

    <button onclick="start()">Collect & Download</button>

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="status" id="status">Waiting...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>
const input = document.getElementById("input");
const bar = document.getElementById("bar");
const status = document.getElementById("status");

// Drag & Drop
const uploadBox = document.querySelector(".upload");

uploadBox.addEventListener("dragover", e => e.preventDefault());

uploadBox.addEventListener("drop", e => {
    e.preventDefault();
    input.files = e.dataTransfer.files;
    status.innerText = "Folder loaded.";
});

// Main Function
async function start() {
    try {
        const files = input.files;

        if (!files.length) {
            status.innerText = "Select a folder first.";
            return;
        }

        const zip = new JSZip();
        const folder = zip.folder("all_images");

        const validExt = [".png",".jpg",".jpeg"];
        const usedNames = new Set();

        let total = 0;
        let processed = 0;

        // Count valid images
        for (let f of files) {
            if (validExt.some(ext => f.name.toLowerCase().endsWith(ext))) {
                total++;
            }
        }

        if (total === 0) {
            status.innerText = "No images found.";
            return;
        }

        // Process files
        for (let file of files) {
            if (!validExt.some(ext => file.name.toLowerCase().endsWith(ext))) continue;

            let base = file.name;
            let newName = base;
            let i = 1;

            // Fix duplicates
            while (usedNames.has(newName)) {
                let dot = base.lastIndexOf(".");
                let name = base.substring(0, dot);
                let ext = base.substring(dot);
                newName = `${name}_${i}${ext}`;
                i++;
            }

            usedNames.add(newName);

            try {
                const data = await file.arrayBuffer();
                folder.file(newName, data);
            } catch {
                console.error("Error reading file:", file.name);
                continue;
            }

            processed++;
            let percent = Math.round((processed / total) * 100);
            bar.style.width = percent + "%";
            status.innerText = `Processing ${processed}/${total}`;
        }

        status.innerText = "Compressing...";

        const blob = await zip.generateAsync({ type: "blob" });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "all_images.zip";
        a.click();

        status.innerText = `Done (${total} images)`;
        bar.style.width = "100%";

    } catch (err) {
        console.error(err);
        status.innerText = "Something went wrong.";
    }
}
</script>

</body>
</html>
